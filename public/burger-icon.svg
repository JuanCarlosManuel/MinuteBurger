<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCCF1D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB81C;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Decorative ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Burger Icon - Centered -->
  <g transform="translate(50, 32)">
    <!-- Top bun with shine -->
    <ellipse cx="0" cy="-10" rx="18" ry="9" fill="#D4A574"/>
    <path d="M -18 -10 Q -18 -15 -10 -17 Q 0 -19 10 -17 Q 18 -15 18 -10" fill="#E8C895"/>
    
    <!-- Sesame seeds - decorative pattern -->
    <circle cx="-10" cy="-14" r="1.5" fill="#F5DEB3"/>
    <circle cx="0" cy="-15" r="1.5" fill="#F5DEB3"/>
    <circle cx="10" cy="-14" r="1.5" fill="#F5DEB3"/>
    <circle cx="-5" cy="-12" r="1" fill="#F5DEB3"/>
    <circle cx="6" cy="-12" r="1" fill="#F5DEB3"/>
    
    <!-- Cheese with glow -->
    <rect x="-16" y="-1" width="32" height="5" fill="#FFD700" rx="1" filter="url(#shadow)"/>
    <rect x="-16" y="-1" width="32" height="2" fill="#FFED4E" opacity="0.6"/>
    
    <!-- Lettuce - layered effect -->
    <path d="M -16 4 Q -11 6 0 6 Q 11 6 16 4" fill="#7CB342" stroke="#558B2F" stroke-width="0.8"/>
    <path d="M -14 5 Q -9 7 0 7 Q 9 7 14 5" fill="#9CCC65" stroke="#7CB342" stroke-width="0.5" opacity="0.7"/>
    
    <!-- Patty with texture -->
    <rect x="-16" y="9" width="32" height="7" fill="#8B4513" rx="1" filter="url(#shadow)"/>
    <ellipse cx="-9" cy="12.5" rx="2.5" ry="1.5" fill="#654321" opacity="0.7"/>
    <ellipse cx="4" cy="12.5" rx="2.5" ry="1.5" fill="#654321" opacity="0.7"/>
    <ellipse cx="-1" cy="14" rx="2" ry="1" fill="#654321" opacity="0.5"/>
    
    <!-- Bottom bun -->
    <ellipse cx="0" cy="21" rx="18" ry="9" fill="#D4A574"/>
    <path d="M -18 15 Q -18 11 -10 9 Q 0 7 10 9 Q 18 11 18 15" fill="#C9956F"/>
  </g>
  
  <!-- Brand text: Bisnar's burger -->
  <text x="50" y="78" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">
    Bisnar's Burger
  </text>
</svg>
