<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="#FCCF1D"/>
  
  <!-- Burger Icon -->
  <g transform="translate(50, 50)">
    <!-- Top bun -->
    <ellipse cx="0" cy="-12" rx="20" ry="10" fill="#D4A574"/>
    <path d="M -20 -12 Q -20 -17 -12 -19 Q 0 -21 12 -19 Q 20 -17 20 -12" fill="#E8C895"/>
    
    <!-- Sesame seeds -->
    <circle cx="-10" cy="-16" r="2" fill="#F5DEB3"/>
    <circle cx="0" cy="-17" r="2" fill="#F5DEB3"/>
    <circle cx="10" cy="-16" r="2" fill="#F5DEB3"/>
    <circle cx="-6" cy="-13" r="1.5" fill="#F5DEB3"/>
    <circle cx="7" cy="-13" r="1.5" fill="#F5DEB3"/>
    
    <!-- Cheese -->
    <rect x="-17" y="-2" width="34" height="6" fill="#FFD700" rx="1"/>
    
    <!-- Lettuce -->
    <path d="M -17 4 Q -12 6 0 6 Q 12 6 17 4" fill="#7CB342" stroke="#558B2F" stroke-width="0.8"/>
    <path d="M -15 5 Q -10 7 0 7 Q 10 7 15 5" fill="#9CCC65" stroke="#7CB342" stroke-width="0.5" opacity="0.7"/>
    
    <!-- Patty -->
    <rect x="-17" y="8" width="34" height="8" fill="#8B4513" rx="1"/>
    <ellipse cx="-10" cy="13" rx="3" ry="2" fill="#654321" opacity="0.6"/>
    <ellipse cx="5" cy="13" rx="3" ry="2" fill="#654321" opacity="0.6"/>
    
    <!-- Bottom bun -->
    <ellipse cx="0" cy="22" rx="20" ry="10" fill="#D4A574"/>
    <path d="M -20 16 Q -20 12 -12 10 Q 0 8 12 10 Q 20 12 20 16" fill="#C9956F"/>
  </g>
</svg>
