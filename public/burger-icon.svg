<svg viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Righteous&display=swap');
      .burger-text {
        font-family: 'Righteous', sans-serif;
        font-size: 48px;
        font-weight: 900;
        font-style: italic;
        fill: #FCCF1D;
        letter-spacing: 2px;
        filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="100" fill="#1a1a1a" rx="8"/>
  
  <!-- Border accent -->
  <rect x="2" y="2" width="296" height="96" fill="none" stroke="#FCCF1D" stroke-width="1.5" rx="6" opacity="0.3"/>
  
  <!-- Bold text logo -->
  <text x="150" y="65" class="burger-text" text-anchor="middle">
    BISNAR'S BURGER
  </text>
</svg>
