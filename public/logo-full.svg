<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Righteous&display=swap');
      .logo-text {
        font-family: 'Righteous', sans-serif;
        font-size: 72px;
        font-weight: 900;
        font-style: italic;
        fill: #FCCF1D;
        letter-spacing: 3px;
        filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.6));
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="150" fill="#1a1a1a" rx="8"/>
  
  <!-- Border accent -->
  <rect x="2" y="2" width="396" height="146" fill="none" stroke="#FCCF1D" stroke-width="2" rx="6" opacity="0.4"/>
  
  <!-- Bold text logo -->
  <text x="200" y="100" class="logo-text" text-anchor="middle">
    BISNAR'S BURGER
  </text>
  
  <!-- Accent line -->
  <line x1="40" y1="115" x2="360" y2="115" stroke="#FCCF1D" stroke-width="2" opacity="0.6"/>
</svg>
